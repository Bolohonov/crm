apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-backend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-backend
    spec:
      containers:
      - name: backend
        image: "{{ .Values.registry }}/{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - containerPort: 8080
        env:
        # ── Database ──
        - name: DB_HOST
          value: {{ .Values.postgresql.host | quote }}
        - name: DB_PORT
          value: {{ .Values.postgresql.port | quote }}
        - name: DB_NAME
          value: {{ .Values.postgresql.database | quote }}
        - name: DB_USERNAME
          value: {{ .Values.postgresql.username | quote }}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: db-password
        # ── Redis ──
        - name: REDIS_HOST
          value: {{ .Values.redis.host | quote }}
        - name: REDIS_PORT
          value: {{ .Values.redis.port | quote }}
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: redis-password
        # ── Kafka ──
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: {{ .Values.kafka.bootstrapServers | quote }}
        - name: KAFKA_CONSUMER_GROUP
          value: {{ .Values.kafka.consumerGroup | quote }}
        - name: KAFKA_TOPIC_SHOP_ORDER_CREATED
          value: {{ .Values.kafka.topics.shopOrderCreated | quote }}
        - name: KAFKA_TOPIC_CRM_STATUS_CHANGED
          value: {{ .Values.kafka.topics.crmOrderStatusChanged | quote }}
        - name: KAFKA_TOPIC_DLQ
          value: {{ .Values.kafka.topics.shopOrderCreatedDlq | quote }}
        - name: KAFKA_SHOP_TENANT_SCHEMA
          value: {{ .Values.kafka.shopTenantSchema | quote }}
        - name: APP_KAFKA_OUTBOX_POLL_INTERVAL_MS
          value: {{ .Values.kafka.outboxPollIntervalMs | quote }}
        # ── JWT ──
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: jwt-secret
        # ── App URLs ──
        - name: FRONTEND_URL
          value: {{ .Values.backend.env.FRONTEND_URL | quote }}
        - name: APP_BASE_URL
          value: {{ .Values.backend.env.APP_BASE_URL | quote }}
        # ── Email ──
        - name: MAIL_HOST
          value: {{ .Values.backend.env.MAIL_HOST | quote }}
        - name: MAIL_PORT
          value: {{ .Values.backend.env.MAIL_PORT | quote }}
        - name: MAIL_USERNAME
          value: {{ .Values.backend.env.MAIL_USERNAME | quote }}
        - name: MAIL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: mail-password
        - name: MAIL_FROM
          value: {{ .Values.backend.env.MAIL_FROM | quote }}
        # ── OAuth ──
        - name: GOOGLE_CLIENT_ID
          value: {{ .Values.backend.env.GOOGLE_CLIENT_ID | quote }}
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: google-client-secret
        - name: YANDEX_CLIENT_ID
          value: {{ .Values.backend.env.YANDEX_CLIENT_ID | quote }}
        - name: YANDEX_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: yandex-client-secret
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
        startupProbe:
          httpGet:
            path: /api/v1/actuator/health
            port: 8080
          initialDelaySeconds: 30
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /api/v1/actuator/health
            port: 8080
          initialDelaySeconds: 5
          timeoutSeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/v1/actuator/health
            port: 8080
          initialDelaySeconds: 5
          timeoutSeconds: 5
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}-backend
  ports:
  - port: {{ .Values.backend.service.port }}
    targetPort: 8080
