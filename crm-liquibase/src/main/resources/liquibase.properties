# ================================================================
#  liquibase.properties — конфигурация Liquibase
#
#  Переменные из environment или secrets-файла:
#    LIQUIBASE_URL, LIQUIBASE_USERNAME, LIQUIBASE_PASSWORD
#
#  Запуск:
#    liquibase update                  # production
#    liquibase update --contexts=demo  # demo-стенд
# ================================================================

# Подключение к БД (переопределяется через env vars или CLI)
url=${LIQUIBASE_URL:jdbc:postgresql://localhost:5432/crm}
username=${LIQUIBASE_USERNAME:crm_user}
password=${LIQUIBASE_PASSWORD:changeme}
driver=org.postgresql.Driver

# Changelog
changeLogFile=db/changelog-master.xml

# Схема для таблиц служебных данных Liquibase
defaultSchemaName=public
liquibaseSchemaName=public

# Логирование
logLevel=INFO

# Не останавливаться при WARN
# strictChecking=false

# Хэш-алгоритм для checksum
checksumVersion=8
