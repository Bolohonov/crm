<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Доступ одобрен</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background: #f0f4f8; margin: 0; padding: 20px; }
        .container { max-width: 560px; margin: 0 auto; background: #fff;
                     border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
                  padding: 40px; text-align: center; }
        .logo { font-size: 24px; font-weight: 700; color: #3b82f6; }
        .logo span { color: #fff; }
        .body { padding: 40px; }
        h1 { font-size: 20px; margin: 0 0 16px; }
        p { font-size: 15px; line-height: 1.6; color: #475569; margin: 0 0 16px; }
        .btn { display: inline-block; background: #3b82f6; color: #fff;
               text-decoration: none; padding: 14px 32px; border-radius: 8px;
               font-weight: 600; margin: 8px 0; }
        .footer { padding: 24px 40px; background: #f8fafc; border-top: 1px solid #e2e8f0; text-align: center; }
        .footer p { font-size: 13px; color: #94a3b8; margin: 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><div class="logo">CRM <span>Cloud</span></div></div>
    <div class="body">
        <h1>🎉 Ваш доступ одобрен!</h1>
        <p>Здравствуйте, <span th:text="${userName}">Пользователь</span>!</p>
        <p>Администратор одобрил ваш запрос на доступ к CRM Cloud. Теперь вы можете войти в систему.</p>
        <a th:href="${loginUrl}" class="btn">Войти в CRM Cloud</a>
    </div>
    <div class="footer"><p>© 2024 CRM Cloud</p></div>
</div>
</body>
</html>
