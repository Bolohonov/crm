<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Запрос на доступ</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background: #f0f4f8; margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 560px; margin: 0 auto; background: #fff;
                     border-radius: 12px; overflow: hidden;
                     box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
                  padding: 40px; text-align: center; }
        .logo { font-size: 24px; font-weight: 700; color: #3b82f6; }
        .logo span { color: #fff; }
        .body { padding: 40px; }
        h1 { font-size: 20px; font-weight: 600; margin: 0 0 16px; }
        p { font-size: 15px; line-height: 1.6; color: #475569; margin: 0 0 12px; }
        .user-card { background: #f8fafc; border: 1px solid #e2e8f0;
                     border-radius: 8px; padding: 16px 20px; margin: 20px 0; }
        .user-card strong { display: block; font-size: 15px; color: #0f172a; margin-bottom: 4px; }
        .user-card span { font-size: 14px; color: #64748b; }
        .actions { display: flex; gap: 12px; margin-top: 24px; }
        .btn-approve { flex: 1; display: inline-block; background: #22c55e; color: #fff;
                       text-decoration: none; padding: 13px; border-radius: 8px;
                       font-size: 14px; font-weight: 600; text-align: center; }
        .btn-reject { flex: 1; display: inline-block; background: #f1f5f9; color: #64748b;
                      text-decoration: none; padding: 13px; border-radius: 8px;
                      font-size: 14px; font-weight: 600; text-align: center;
                      border: 1px solid #e2e8f0; }
        .footer { padding: 24px 40px; background: #f8fafc;
                  border-top: 1px solid #e2e8f0; text-align: center; }
        .footer p { font-size: 13px; color: #94a3b8; margin: 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">CRM <span>Cloud</span></div>
    </div>
    <div class="body">
        <h1>Запрос на доступ</h1>
        <p>Здравствуйте, <span th:text="${adminName}">Администратор</span>!</p>
        <p>Пользователь хочет получить доступ к вашей CRM-системе:</p>
        <div class="user-card">
            <strong th:text="${userName}">Иванов Иван Иванович</strong>
            <span th:text="${userEmail}"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="553c23343b15302d34382539307b363a38">[email&#160;protected]</a></span>
        </div>
        <p>Вы можете одобрить или отклонить этот запрос:</p>
        <div class="actions">
            <a th:href="${approveUrl}" class="btn-approve">✓ Одобрить</a>
            <a th:href="${rejectUrl}" class="btn-reject">✕ Отклонить</a>
        </div>
    </div>
    <div class="footer">
