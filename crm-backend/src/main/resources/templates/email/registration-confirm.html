<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение регистрации</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background: #f0f4f8; margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 560px; margin: 0 auto; background: #ffffff;
                     border-radius: 12px; overflow: hidden;
                     box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
                  padding: 40px 40px 32px; text-align: center; }
        .logo { font-size: 24px; font-weight: 700; color: #3b82f6; letter-spacing: -0.5px; }
        .logo span { color: #ffffff; }
        .body { padding: 40px; }
        h1 { font-size: 22px; font-weight: 600; margin: 0 0 16px; color: #0f172a; }
        p { font-size: 15px; line-height: 1.6; color: #475569; margin: 0 0 16px; }
        .btn { display: inline-block; background: #3b82f6; color: #ffffff;
               text-decoration: none; padding: 14px 32px; border-radius: 8px;
               font-size: 15px; font-weight: 600; margin: 8px 0 24px; }
        .footer { padding: 24px 40px; background: #f8fafc;
                  border-top: 1px solid #e2e8f0; text-align: center; }
        .footer p { font-size: 13px; color: #94a3b8; margin: 0; }
        .expiry { font-size: 13px; color: #94a3b8; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">CRM <span>Cloud</span></div>
    </div>
    <div class="body">
        <h1>Добро пожаловать, <span th:text="${userName}">Имя</span>!</h1>
        <p>Вы успешно зарегистрировались в <strong>CRM Cloud</strong>. Для активации аккаунта подтвердите ваш email-адрес.</p>
        <p>
            <a th:href="${confirmUrl}" class="btn">Подтвердить email</a>
        </p>
        <p class="expiry">
            Ссылка действительна <span th:text="${expiresHours}">24</span> часа.<br>
            Если вы не регистрировались — просто проигнорируйте это письмо.
        </p>
    </div>
    <div class="footer">
        <p>© 2024 CRM Cloud. Это письмо отправлено автоматически.</p>
    </div>
</div>
</body>
</html>
